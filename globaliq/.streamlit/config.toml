[theme]
base            = "dark"
primaryColor    = "#00d4aa"
backgroundColor = "#07090f"
secondaryBackgroundColor = "#0d1117"
textColor       = "#e8edf5"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
